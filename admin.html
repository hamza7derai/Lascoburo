<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lascoburo | Admin Dashboard</title>
    <link rel="stylesheet" href="admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="admin-wrapper">
        <aside class="sidebar">
            <div class="logo">Lasco<span>Admin</span></div>
            <nav>
                <button class="nav-item active" onclick="switchTab('stats')">📊 Dashboard</button>
                <button class="nav-item" onclick="switchTab('inventory')">📦 Inventaire</button>
                <button class="nav-item" onclick="switchTab('cats')">📁 Catégories</button>
            </nav>
        </aside>

        <main class="main-content">
            
            <section id="stats" class="tab-content active">
                <div class="stats-header">
                    <h1 style="margin-top: 0;">Aperçu de l'activité</h1>
                    <div class="stats-grid">
                        <div class="card">
                            <h3>Valeur de Vente</h3>
                            <p id="rev">0 DH</p>
                        </div>
                        <div class="card profit">
                            <h3>Profit Potentiel</h3>
                            <p id="prof">0 DH</p>
                        </div>
                        <div class="card alert">
                            <h3>Stock Bas</h3>
                            <p id="low">0</p>
                        </div>
                    </div>
                </div>
            </section>

            <section id="inventory" class="tab-content">
                <h1 style="margin-top: 0;">Inventaire</h1>
                
                <div class="form-card">
                    <h3>Ajouter / Modifier un Produit</h3>
                    <div class="form-grid">
                        <input type="text" id="pName" placeholder="Nom du produit (ex: Sac à dos)">
                        <select id="pCatSelect"><option value="">Chargement des catégories...</option></select>
                        <input type="number" id="pCost" placeholder="Prix d'Achat (DH)" oninput="calc()">
                        <input type="number" id="pSell" placeholder="Prix de Vente (DH)" oninput="calc()">
                        <input type="number" id="pStock" placeholder="Quantité Stock">
                        <input type="text" id="pVariants" placeholder="Variantes (ex: Bleu, Rouge)">
                        <input type="text" id="pImg" placeholder="URL de l'image (PNG/JPG)" style="grid-column: span 2;">
                    </div>
                    <div class="profit-box" id="profitInfo">Profit: 0 DH | Marge: 0%</div>
                    <button class="btn-save" onclick="saveProduct()">Enregistrer le produit</button>
                </div>

                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Produit</th>
                                <th>Catégorie</th>
                                <th>Stock</th>
                                <th>Vente</th>
                                <th>Profit/U</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryTable"></tbody>
                    </table>
                </div>
            </section>

            <section id="cats" class="tab-content">
                <h1 style="margin-top: 0;">Gérer les Catégories</h1>
                
                <div class="form-card">
                    <h3>Nouvelle Catégorie</h3>
                    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <input type="text" id="newCatName" placeholder="Nom de la catégorie (ex: Géométrie)" style="flex: 1; margin: 0;">
                        <button class="btn-save" onclick="addCategory()" style="margin: 0; width: auto; padding: 0 30px;">+ Créer</button>
                    </div>
                    
                    <div class="table-container" style="box-shadow: none; padding: 0;">
                        <div id="catListDisplay" style="display: flex; flex-direction: column; gap: 10px;"></div>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script type="module" src="admin-logic.js"></script>
</body>
</html>
