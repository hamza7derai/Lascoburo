<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lascoburo Admin | Gestion Stock & Profit</title>
    <link rel="stylesheet" href="admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="admin-container">
        <aside class="sidebar">
            <div class="logo">Lasco<span>Admin</span></div>
            <nav>
                <button class="nav-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
                <button class="nav-btn" onclick="switchTab('inventory')">📦 Inventaire</button>
                <button class="nav-btn" onclick="switchTab('add')">➕ Ajouter Produit</button>
            </nav>
        </aside>

        <main class="content">
            <section id="dashboard" class="tab-content active">
                <header>
                    <h1>Tableau de bord</h1>
                    <p>Résumé financier de votre stock à Marrakech.</p>
                </header>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Valeur de Vente</h3>
                        <p id="totalRevenue">0.00 DH</p>
                    </div>
                    <div class="stat-card profit">
                        <h3>Profit Potentiel</h3>
                        <p id="totalProfit">0.00 DH</p>
                    </div>
                    <div class="stat-card warning">
                        <h3>Stock Faible</h3>
                        <p id="lowStockCount">0</p>
                    </div>
                </div>
            </section>

            <section id="add" class="tab-content">
                <div class="form-card">
                    <h2>Nouveau Produit</h2>
                    <div class="form-grid">
                        <input type="text" id="pName" placeholder="Nom du produit (ex: Cahier 96p)">
                        <select id="pCat">
                            <option value="Papeterie">Papeterie</option>
                            <option value="Cahiers">Cahiers</option>
                            <option value="Sacs">Sacs</option>
                            <option value="Bureau">Bureau</option>
                        </select>
                        <input type="number" id="pCost" placeholder="Prix d'Achat (Coût)" oninput="updateMargin()">
                        <input type="number" id="pSell" placeholder="Prix de Vente" oninput="updateMargin()">
                        <input type="number" id="pStock" placeholder="Quantité en Stock">
                        <input type="text" id="pImg" placeholder="URL de l'image">
                    </div>
                    
                    <div class="margin-preview" id="marginPreview">
                        Profit: 0 DH | Marge: 0%
                    </div>

                    <button class="save-btn" onclick="saveProduct()">Enregistrer dans l'Inventaire</button>
                </div>
            </section>

            <section id="inventory" class="tab-content">
                <div class="table-container">
                    <table id="productTable">
                        <thead>
                            <tr>
                                <th>Produit</th>
                                <th>Stock</th>
                                <th>Vente</th>
                                <th>Profit/U</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventoryBody">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="admin-logic.js"></script>
</body>
</html>
