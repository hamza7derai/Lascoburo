<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lascoburo | Admin Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* CSS Admin Integré */
        :root { --primary: #1E3A8A; --primary-light: #2563EB; --success: #10B981; --danger: #EF4444; --warning: #F59E0B; --bg: #F4F7FE; --card: #FFFFFF; --text-main: #1E293B; --text-muted: #64748B; --border: #E2E8F0; --shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); }
        .admin-layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
        .sidebar { background: var(--primary); color: white; padding: 30px 20px; }
        .logo { font-size: 24px; font-weight: 800; margin-bottom: 40px; }
        .logo span { color: var(--success); }
        .nav-btn { display: block; width: 100%; padding: 14px 20px; border-radius: 12px; border:none; background: transparent; color: #94A3B8; text-align: left; font-size: 15px; font-weight: 500; cursor: pointer; margin-bottom: 8px; }
        .nav-btn.active { background: rgba(255,255,255,0.1); color: white; font-weight: 600; }
        .main-content { padding: 40px; overflow-y: auto; height: 100vh; }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 24px; border-radius: 20px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 20px; }
        .stat-icon { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: #E0E7FF; }
        .stat-data .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        .stat-data strong { font-size: 22px; font-weight: 800; color: var(--text-main); }
        .content-card { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: var(--shadow); margin-bottom: 30px; }
        .form-layout { display: grid; grid-template-columns: 250px 1fr; gap: 40px; }
        .image-preview { width: 100%; aspect-ratio: 1; border-radius: 16px; border: 2px dashed #CBD5E1; overflow: hidden; background: #F8FAFC; display: flex; align-items: center; justify-content: center; margin-bottom:15px;}
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; }
        .input-field { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); font-size: 14px; font-family: inherit; background: #F8FAFC; outline: none; }
        .input-field:focus { border-color: var(--primary-light); background: white; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-primary { background: var(--success); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; }
        .label-with-action { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .text-btn-action { background: var(--warning); color: white; border: none; font-size: 11px; font-weight: 700; cursor: pointer; padding: 4px 10px; border-radius: 6px; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: left; padding: 15px; border-bottom: 1px solid var(--border); font-size: 12px; text-transform: uppercase; }
        .data-table td { padding: 15px; border-bottom: 1px solid #F1F5F9; font-size: 14px; }
        
        /* VARIANTS UI */
        .variants-box { background: #F8FAFC; border: 2px dashed #CBD5E1; border-radius: 16px; padding: 20px; margin-top: 10px; display: none; }
        .v-tag { background: white; border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; display: inline-flex; align-items: center; gap: 10px; font-size: 13px; font-weight: 600; margin: 5px; box-shadow: var(--shadow); }
        .v-tag button { background: #FEE2E2; color: #EF4444; border: none; border-radius: 6px; width: 24px; height: 24px; cursor: pointer; font-weight: bold; }

        @media (max-width: 1024px) { .admin-layout { grid-template-columns: 1fr; } .sidebar { display: none; } .form-layout { grid-template-columns: 1fr; } .stats-row { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <div class="admin-layout">
        <aside class="sidebar"><div class="logo">Lasco<span>Admin</span></div><nav><button class="nav-btn active">📊 Dashboard</button></nav></aside>

        <main class="main-content">
            <header style="margin-bottom: 30px;"><h1>Bonjour, Lascoburo 👋</h1></header>

            <div class="stats-row">
                <div class="stat-card"><div class="stat-icon">🛍️</div><div class="stat-data"><span class="label">Valeur Vente</span><strong id="rev">0 DH</strong></div></div>
                <div class="stat-card"><div class="stat-icon" style="background:#D1FAE5; color:#10B981;">📦</div><div class="stat-data"><span class="label">Stock Total</span><strong id="totalStock">0</strong></div></div>
            </div>

            <div class="content-card">
                <h2 style="margin-bottom:25px; color:var(--primary);">Nouveau Produit</h2>
                <div class="form-layout">
                    <div>
                        <div class="image-preview"><img id="previewImg" src="https://placehold.co/400x400/f8fafc/94a3b8?text=Image"></div>
                        <input type="text" id="pImg" class="input-field" placeholder="Lien de l'image...">
                    </div>

                    <div>
                        <div class="input-group"><label>Nom du produit</label><input type="text" id="pName" class="input-field" placeholder="Ex: Stylo Pilot G-2"></div>
                        
                        <div class="input-row">
                            <div class="input-group">
                                <div class="label-with-action">
                                    <label>Catégorie Pincipale</label>
                                    <button type="button" id="btnShowAddCat" class="text-btn-action">+ Nouvelle Catégorie</button>
                                </div>
                                <select id="pCatSelect" class="input-field"><option value="">Choisir...</option></select>
                            </div>
                            <div class="input-group">
                                <label>Sous-catégorie</label>
                                <select id="pSubCatSelect" class="input-field"><option value="">Choisir la catégorie d'abord...</option></select>
                            </div>
                        </div>

                        <div class="input-row">
                            <div class="input-group"><label>Prix d'achat (DH)</label><input type="number" id="pCost" class="input-field" placeholder="Coût"></div>
                            <div class="input-group"><label>Prix de vente Standard (DH)</label><input type="number" id="pSell" class="input-field" placeholder="Vente"></div>
                        </div>
                        <div class="input-group"><label>Quantité en stock globale</label><input type="number" id="pStock" class="input-field" placeholder="Stock"></div>

                        <div class="input-group" style="background: #EFF6FF; padding: 15px; border-radius: 12px; border: 1px solid #BFDBFE;">
                            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin: 0; color: #1E3A8A;">
                                <input type="checkbox" id="hasVariants" style="width: 20px; height: 20px;" onchange="toggleVariants()">
                                <strong>Activer les variantes (Couleurs, Tailles, etc.)</strong>
                            </label>
                            
                            <div id="variantsBox" class="variants-box">
                                <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 10px;">Ajoutez des options. Si activé, le client devra choisir une option avant d'ajouter au panier.</p>
                                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                                    <input type="text" id="vName" class="input-field" placeholder="Ex: Bleu" style="padding: 10px;">
                                    <input type="number" id="vPrice" class="input-field" placeholder="Prix (DH)" style="padding: 10px; width: 120px;">
                                    <button type="button" onclick="addVariant()" style="background: var(--primary); color: white; border: none; border-radius: 10px; padding: 0 15px; font-weight: bold; cursor: pointer;">+</button>
                                </div>
                                <div id="vList"></div>
                            </div>
                        </div>

                        <button type="button" id="btnSaveProduct" class="btn-primary">💾 Enregistrer le produit</button>
                    </div>
                </div>
            </div>

            <div class="content-card">
                <h2 style="margin-bottom:20px;">Liste des produits</h2>
                <div style="overflow-x:auto;"><table class="data-table"><thead><tr><th>Image</th><th>Produit</th><th>Catégorie > Sous-cat</th><th>Stock</th><th>Prix</th><th>Actions</th></tr></thead><tbody id="inventoryTable"></tbody></table></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCKY59mqLqD4GqQpkDEFqNybKIkwLvgId0",
            authDomain: "lascoburo.firebaseapp.com",
            projectId: "lascoburo",
            storageBucket: "lascoburo.firebasestorage.app",
            messagingSenderId: "918363477454",
            appId: "1:918363477454:web:ef0a991d24de1ea992879f"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let globalCategories = []; // Store raw category data

        document.getElementById('pImg').addEventListener('input', e => {
            document.getElementById('previewImg').src = e.target.value || 'https://placehold.co/400x400/f8fafc/94a3b8?text=Image';
        });

        // --- NEW CATEGORY SYSTEM WITH SUBCATEGORIES ---
        document.getElementById('btnShowAddCat').addEventListener('click', async () => {
            const cat = window.prompt("1. Nom de la catégorie principale (ex: Fournitures scolaires) :");
            if(cat) {
                const subCatsRaw = window.prompt("2. Sous-catégories (séparées par des virgules) (ex: Stylos, Cahiers, Gommes) :");
                let subCats = [];
                if(subCatsRaw) {
                    subCats = subCatsRaw.split(',').map(s => s.trim()).filter(s => s !== '');
                }
                
                // Save to Firebase as an object with subcategories array
                await addDoc(collection(db, "categories"), { name: cat.trim(), subcategories: subCats });
                alert("Catégorie et sous-catégories ajoutées !");
            }
        });

        // Load Categories into Dropdown
        onSnapshot(collection(db, "categories"), snap => {
            globalCategories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            // Sort alphabetically by name
            globalCategories.sort((a,b) => a.name.localeCompare(b.name));
            
            document.getElementById('pCatSelect').innerHTML = '<option value="">Choisir...</option>' + 
                globalCategories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
        });

        // When Main Category changes, update SubCategory dropdown
        document.getElementById('pCatSelect').addEventListener('change', (e) => {
            const selectedCatName = e.target.value;
            const subCatSelect = document.getElementById('pSubCatSelect');
            
            if(!selectedCatName) {
                subCatSelect.innerHTML = '<option value="">Choisir la catégorie d\'abord...</option>';
                return;
            }

            const catData = globalCategories.find(c => c.name === selectedCatName);
            if(catData && catData.subcategories && catData.subcategories.length > 0) {
                subCatSelect.innerHTML = '<option value="">(Optionnel) Choisir sous-cat...</option>' + 
                    catData.subcategories.map(sub => `<option value="${sub}">${sub}</option>`).join('');
            } else {
                subCatSelect.innerHTML = '<option value="">Aucune sous-catégorie disponible</option>';
            }
        });


        // --- VARIANTS LOGIC ---
        window.productVariants = [];
        window.toggleVariants = () => { document.getElementById('variantsBox').style.display = document.getElementById('hasVariants').checked ? 'block' : 'none'; };
        window.addVariant = () => {
            const n = document.getElementById('vName').value.trim();
            const p = parseFloat(document.getElementById('vPrice').value);
            if(n && !isNaN(p)) {
                window.productVariants.push({ name: n, price: p });
                document.getElementById('vName').value = '';
                document.getElementById('vPrice').value = '';
                renderVariants();
            }
        };
        window.removeVariant = (idx) => { window.productVariants.splice(idx, 1); renderVariants(); };
        function renderVariants() {
            document.getElementById('vList').innerHTML = window.productVariants.map((v, i) => 
                `<div class="v-tag">${v.name} - ${v.price} DH <button type="button" onclick="removeVariant(${i})">X</button></div>`
            ).join('');
        }

        // Save Product (Now includes subCategory)
        document.getElementById('btnSaveProduct').addEventListener('click', async () => {
            const data = {
                name: document.getElementById('pName').value,
                category: document.getElementById('pCatSelect').value,
                subCategory: document.getElementById('pSubCatSelect').value || "", // NEW
                costPrice: parseFloat(document.getElementById('pCost').value) || 0,
                sellPrice: parseFloat(document.getElementById('pSell').value) || 0,
                stock: parseInt(document.getElementById('pStock').value) || 0,
                imageUrl: document.getElementById('pImg').value,
                variants: document.getElementById('hasVariants').checked ? window.productVariants : [],
                timestamp: new Date()
            };

            if(!data.name || !data.category) return alert("Remplissez le nom et la catégorie principale.");
            
            await addDoc(collection(db, "products"), data);
            alert("Produit ajouté !");
            window.location.reload(); 
        });

        // Table
        window.deleteProd = async (id) => { if(confirm("Supprimer ?")) await deleteDoc(doc(db, "products", id)); };
        onSnapshot(collection(db, "products"), snap => {
            const prods = snap.docs.map(d => ({id: d.id, ...d.data()}));
            let rev = 0, stk = 0;
            document.getElementById('inventoryTable').innerHTML = prods.map(p => {
                rev += p.sellPrice * p.stock; stk += p.stock;
                const vBadge = p.variants && p.variants.length > 0 ? `<br><small style="color:#2563EB;">${p.variants.length} options</small>` : '';
                const subCatDisplay = p.subCategory ? `<br><small style="color:var(--text-muted);">↳ ${p.subCategory}</small>` : '';
                
                return `<tr>
                    <td><img src="${p.imageUrl || 'https://placehold.co/40x40'}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;"></td>
                    <td><strong>${p.name}</strong>${vBadge}</td>
                    <td>${p.category} ${subCatDisplay}</td>
                    <td>${p.stock}</td>
                    <td>${p.sellPrice} DH</td>
                    <td><button onclick="deleteProd('${p.id}')" style="background:#FEE2E2; color:#EF4444; border:none; padding:8px; border-radius:6px; cursor:pointer;">X</button></td>
                </tr>`;
            }).join('');
            document.getElementById('rev').innerText = rev + " DH";
            document.getElementById('totalStock').innerText = stk;
        });
    </script>
</body>
</html>
