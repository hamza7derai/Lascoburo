<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lascoburo | Fournitures Scolaires Marrakech</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <header class="app-header">
        <div class="container">
            <h1 class="logo">Lasco<span>buro</span></h1>
            <p class="tagline">Tout pour apprendre, créer, réussir.</p>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Rechercher un produit...">
                <span class="icon">🔍</span>
            </div>
        </div>
    </header>

    <section class="categories-wrapper">
        <div class="categories-scroll" id="catBar">
            <button class="cat-pill active" onclick="filterCat('Tous')">Tous</button>
            <button class="cat-pill" onclick="filterCat('Papeterie')">Papeterie</button>
            <button class="cat-pill" onclick="filterCat('Cahiers')">Cahiers</button>
            <button class="cat-pill" onclick="filterCat('Sacs')">Sacs</button>
        </div>
    </section>

    <main class="container">
        <div class="product-grid" id="customerGrid">
            <div class="loader">Chargement des produits...</div>
        </div>
    </main>

    <div id="orderBar" class="order-bar hidden">
        <div class="bar-content">
            <div class="cart-summary">
                <span id="cartCount">0</span> articles
                <strong id="cartPrice">0 DH</strong>
            </div>
            <button class="whatsapp-btn" onclick="openWhatsApp()">
                Commander en 1 clic 💬
            </button>
        </div>
    </div>

    <script type="module" src="app-logic.js"></script>
</body>
</html>
