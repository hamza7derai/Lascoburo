<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lascoburo | Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* ALL PREMIUM CSS INCLUDED */
        :root { --primary: #1E3A8A; --primary-light: #EFF6FF; --accent: #2563EB; --success: #10B981; --danger: #EF4444; --bg: #F8FAFC; --surface: #FFFFFF; --text-main: #0F172A; --text-muted: #64748B; --border: #E2E8F0; --shadow-sm: 0 2px 8px rgba(0,0,0,0.04); --shadow-lg: 0 20px 25px -5px rgba(30,58,138,0.25); --radius-pill: 50px; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text-main); padding-bottom: 120px; overflow-x: hidden;}
        .container { padding: 0 20px; max-width: 600px; margin: 0 auto; }
        svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* HEADER & SEARCH */
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .brand h1 { font-size: 22px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        .brand span { color: var(--text-main); }
        .brand p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .icon-btn { position: relative; background: var(--primary); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; }
        .badge { position: absolute; top: -2px; right: -2px; background: #EF4444; color: white; font-size: 10px; font-weight: 800; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .search-wrapper { position: relative; margin-bottom: 24px; }
        .search-wrapper input { width: 100%; border: 1px solid var(--border); padding: 16px 20px 16px 50px; border-radius: var(--radius-pill); font-size: 15px; font-family: inherit; outline: none; }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 20px; height: 20px; }

        /* CATEGORIES & BANNER */
        .categories-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; margin: 0 -20px 24px -20px; padding: 0 20px 10px 20px; scroll-behavior: smooth; }
        .categories-scroll::-webkit-scrollbar { display: none; }
        .cat-chip { display: flex; align-items: center; gap: 8px; padding: 12px 20px; background: white; border: 1px solid var(--border); border-radius: var(--radius-pill); font-size: 14px; font-weight: 600; color: var(--text-muted); white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .cat-chip.active { background: var(--primary); color: white; border-color: var(--primary); }
        .promo-banner { background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%); border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 30px; position: relative; }
        .promo-icon-bg { background: var(--primary); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .promo-text h3 { font-size: 14px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
        .promo-text p { font-size: 12px; line-height: 1.4; max-width: 200px; }
        .promo-image { position: absolute; right: 10px; bottom: 5px; font-size: 50px; }

        /* PRODUCT GRID */
        .section-header { margin-bottom: 16px; font-size: 18px; font-weight: 800; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .product-card { background: white; border-radius: 20px; padding: 12px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; cursor: pointer; transition: transform 0.2s; }
        .product-card:active { transform: scale(0.97); }
        .product-img-box { background: var(--bg); border-radius: 16px; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; overflow: hidden; padding:10px;}
        .product-img-box img { max-width: 100%; max-height: 100%; object-fit: contain; mix-blend-mode: multiply; }
        .product-info h3 { font-size: 13px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
        .product-info p { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }
        .product-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
        .price { font-size: 16px; font-weight: 800; color: var(--primary); }
        .stock-indicator { display: flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; margin-top:4px;}
        .stock-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; }
        .btn-add { background: var(--primary); color: white; border: none; width: 32px; height: 32px; border-radius: 10px; font-size: 18px; font-weight: bold; pointer-events: none; }

        /* STICKY CART */
        .sticky-cart { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--primary); border-radius: 16px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-lg); z-index: 90; transition: transform 0.4s; cursor: pointer; }
        .sticky-cart.hidden { transform: translateY(200%); }
        .cart-left { display: flex; align-items: center; gap: 15px; color: white; font-weight: 700; font-size:15px;}
        .cart-left .divider { width: 2px; height: 16px; background: rgba(255,255,255,0.3); }
        .btn-checkout-arrow { color: white; display: flex; align-items: center; font-size: 14px; font-weight:bold;}

        /* MODALS */
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 30px 30px 0 0; padding: 25px 20px 30px; z-index: 1001; transform: translateY(100%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); max-height: 90vh; overflow-y: auto; }
        .bottom-sheet.active { transform: translateY(0); }
        .sheet-handle { width: 40px; height: 5px; background: #E2E8F0; border-radius: 10px; margin: 0 auto 20px; }
        .close-modal-btn { position: absolute; top: 20px; right: 20px; background: var(--bg); border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* ADVANCED PRODUCT UI */
        .modal-product-layout { display: flex; gap: 20px; margin-bottom: 20px; }
        .modal-img-box { width: 110px; height: 110px; background: var(--bg); border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .modal-img-box img { max-width: 100%; max-height: 100%; mix-blend-mode: multiply; }
        .modal-info h2 { font-size: 18px; font-weight: 800; margin-bottom: 5px; line-height: 1.2;}
        .stock-badge { display: inline-flex; align-items: center; background: #D1FAE5; color: #065F46; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; gap: 6px; margin-top:8px;}

        /* VARIANT SELECTORS */
        .section-label { font-size: 14px; font-weight: 800; margin-bottom: 12px; display: block; }
        .variant-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; }
        .variant-box { position: relative; border: 2px solid var(--border); border-radius: 12px; padding: 12px 16px; cursor: pointer; transition: 0.2s; font-weight: 700; font-size: 13px; color: var(--text-muted); text-align: center; flex: 1; min-width: 70px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .variant-box.active { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
        .v-check { position: absolute; top: -8px; right: -8px; background: var(--primary); color: white; width: 20px; height: 20px; border-radius: 50%; display: none; align-items: center; justify-content: center; border: 2px solid white; }
        .v-check svg { width: 12px; height: 12px; stroke-width: 3; }
        .variant-box.active .v-check { display: flex; }

        /* QTY & ADD BUTTON */
        .qty-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .qty-controls { display: flex; align-items: center; background: var(--bg); border-radius: 12px; padding: 4px; }
        .qty-btn { width: 36px; height: 36px; background: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: var(--shadow-sm); }
        .qty-number { width: 40px; text-align: center; font-weight: 800; font-size: 16px; }
        
        .price-summary { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--bg); border-radius: 16px; margin-bottom: 15px; font-weight: 700; font-size: 14px;}
        .btn-large-primary { width: 100%; background: var(--success); color: white; border: none; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }

        /* TRUST BADGES */
        .trust-badges { display: flex; justify-content: space-between; border-top: 1px solid var(--border); margin-top: 20px; padding-top: 20px; }
        .trust-item { display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; font-size: 10px; color: var(--text-muted); font-weight: 600; width: 30%; }
        .trust-item svg { width: 20px; height: 20px; color: var(--text-main); stroke-width: 1.5; }

        /* CART MODAL */
        .cart-item-row { display: flex; align-items: center; gap: 15px; background: white; border: 1px solid var(--border); padding: 12px; border-radius: 16px; margin-bottom: 12px;}
        .cart-item-img { width: 60px; height: 60px; background: var(--bg); border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 5px; }
        .cart-item-img img { max-width: 100%; max-height: 100%; mix-blend-mode: multiply; }
        .cart-item-details { flex: 1; }
        .variant-tag { font-size: 11px; background: var(--primary-light); color: var(--primary); padding: 2px 8px; border-radius: 6px; font-weight: 700; display: inline-block; margin-top: 4px;}
        .btn-remove { background: #FEE2E2; color: var(--danger); border: none; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <header class="app-header">
            <div class="brand">
                <h1>Lasco<span>buro</span></h1>
                <p>Tout pour apprendre, créer, réussir.</p>
            </div>
            <div class="icon-btn" onclick="openCartModal()">
                <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span class="badge top-cart-badge">0</span>
            </div>
        </header>

        <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" placeholder="Rechercher un produit...">
        </div>

        <div class="categories-scroll" id="catBar"></div>

        <div class="promo-banner">
            <div class="promo-icon-bg"><svg viewBox="0 0 24 24" style="fill:white; stroke:none;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg></div>
            <div class="promo-text"><h3>Livraison rapide à Marrakech</h3><p>Commandez aujourd'hui, recevez en moins de 30 min.</p></div>
            <div class="promo-image">🛵</div>
        </div>

        <h2 class="section-header">Nos produits</h2>
        <main class="product-grid" id="customerGrid"></main>
    </div>

    <div class="sticky-cart hidden" id="orderBar" onclick="openCartModal()">
        <div class="cart-left">
            <svg viewBox="0 0 24 24" style="width:24px; height:24px;"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <span id="cartCountText">0 articles</span>
            <div class="divider"></div>
            <span id="cartPrice">0 DH</span>
        </div>
        <div class="btn-checkout-arrow">Voir le panier <svg viewBox="0 0 24 24" style="width:18px;height:18px;"><polyline points="9 18 15 12 9 6"></polyline></svg></div>
    </div>

    <div class="overlay" id="productOverlay" onclick="closeProductModal()"></div>
    <div class="bottom-sheet" id="productModal">
        <div class="sheet-handle"></div>
        <button class="close-modal-btn" onclick="closeProductModal()"><svg viewBox="0 0 24 24" style="width:16px;height:16px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        <div id="productModalContent"></div>
    </div>

    <div class="overlay" id="cartOverlay" onclick="closeCartModal()"></div>
    <div class="bottom-sheet" id="cartModal">
        <div class="sheet-handle"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-weight:800; font-size:22px;">Votre Panier</h2>
            <button class="close-modal-btn" style="position:relative; top:0; right:0;" onclick="closeCartModal()"><svg viewBox="0 0 24 24" style="width:16px;height:16px;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        </div>
        <div id="cartItemsContainer" style="max-height:40vh; overflow-y:auto; margin-bottom:20px;"></div>
        <div style="display:flex; justify-content:space-between; font-size:20px; font-weight:800; margin-bottom:20px; border-top:2px dashed var(--border); padding-top:15px;">
            <span>Total :</span><span style="color:var(--primary);" id="cartModalTotal">0 DH</span>
        </div>
        <button class="btn-large-primary" onclick="triggerWhatsApp()">
            <svg viewBox="0 0 24 24" style="fill:white; stroke:none; width:20px; height:20px;"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
            Commander via WhatsApp
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCKY59mqLqD4GqQpkDEFqNybKIkwLvgId0",
            authDomain: "lascoburo.firebaseapp.com",
            projectId: "lascoburo",
            storageBucket: "lascoburo.firebasestorage.app",
            messagingSenderId: "918363477454",
            appId: "1:918363477454:web:ef0a991d24de1ea992879f"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allProducts = [], allCategories = [], currentCategory = 'Tous', searchQuery = '';
        let cart = [], currentModalProduct = null, currentModalQty = 1, currentVariantObj = null;

        const categoryIcons = {
            'Cahiers': '<svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>',
            'Stylos': '<svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>',
            'Sacs': '<svg viewBox="0 0 24 24"><path d="M4 10h16v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V10z"></path><path d="M8 10V6a4 4 0 0 1 8 0v4"></path></svg>',
            'default': '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>'
        };

        onSnapshot(collection(db, "products"), snap => {
            allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const rawCategories = [...new Set(allProducts.map(p => p.category))];
            allCategories = rawCategories.filter(cat => cat && cat.trim() !== '').sort();
            renderCategories(); filterAndRenderProducts();
        });

        function renderCategories() {
            let html = `<div id="cat-Tous" class="cat-chip ${currentCategory === 'Tous' ? 'active' : ''}" onclick="window.setCategory('Tous', 'cat-Tous')">${categoryIcons['default']} Tous</div>`;
            allCategories.forEach((cat, index) => {
                const icon = categoryIcons[cat] || categoryIcons['default'];
                html += `<div id="cat-${index}" class="cat-chip ${currentCategory === cat ? 'active' : ''}" onclick="window.setCategory('${cat}', 'cat-${index}')">${icon} ${cat}</div>`;
            });
            document.getElementById('catBar').innerHTML = html;
        }

        window.setCategory = (catName, elementId) => {
            currentCategory = catName; renderCategories(); filterAndRenderProducts();
            setTimeout(() => { const el = document.getElementById(elementId); if(el) el.scrollIntoView({ behavior: 'smooth', inline: 'center' }); }, 50);
        };

        document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value.toLowerCase(); filterAndRenderProducts(); });

        function filterAndRenderProducts() {
            let filtered = allProducts;
            if (currentCategory !== 'Tous') filtered = filtered.filter(p => p.category === currentCategory);
            if (searchQuery !== '') filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery));
            
            const grid = document.getElementById('customerGrid');
            if (filtered.length === 0) return grid.innerHTML = `<div style="grid-column: span 2; text-align: center; padding: 40px; color: var(--text-muted);">Aucun produit trouvé.</div>`;

            grid.innerHTML = filtered.map(p => {
                let img = p.imageUrl ? `<img src="${p.imageUrl}">` : `<span style="font-weight:bold; color:var(--primary);">${p.name.split(' ')[0]}</span>`;
                let stockHTML = p.stock > 0 ? `<div class="stock-indicator"><div class="stock-dot"></div> En stock</div>` : `<div class="stock-indicator" style="color:var(--danger);"><div class="stock-dot" style="background:var(--danger);"></div> Rupture</div>`;
                // Determine display price (if variants exist, use lowest variant price or main price)
                let displayPrice = p.sellPrice;
                if(p.variants && p.variants.length > 0) {
                    displayPrice = `À partir de ${Math.min(...p.variants.map(v => v.price))}`;
                }
                return `
                    <div class="product-card" onclick="window.openProductModal('${p.id}')">
                        <div class="product-img-box">${img}</div>
                        <div class="product-info"><h3>${p.name}</h3><p>${p.category}</p></div>
                        <div class="product-footer">
                            <div class="price-stock"><span class="price" style="${typeof displayPrice === 'string' ? 'font-size:13px;' : ''}">${displayPrice} DH</span>${stockHTML}</div>
                            <button class="btn-add" style="${p.stock <= 0 ? 'background:var(--border); color:var(--text-muted);' : ''}">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- ADVANCED MODAL (VARIANTS INTEGRATION) ---
        window.openProductModal = (id) => {
            const product = allProducts.find(p => p.id === id);
            if (!product || product.stock <= 0) return;
            
            currentModalProduct = product;
            currentModalQty = 1;
            
            // Check for variants
            let variantsHTML = '';
            currentVariantObj = null;

            if(product.variants && product.variants.length > 0) {
                currentVariantObj = product.variants[0]; // Select first by default
                variantsHTML = `
                    <span class="section-label">Options disponibles</span>
                    <div class="variant-grid" id="modalVariantsGrid">
                        ${product.variants.map((v, i) => `
                            <div class="variant-box ${i === 0 ? 'active' : ''}" onclick="window.selectVariant(${i})">
                                <div class="v-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                                <span>${v.name}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            let basePrice = currentVariantObj ? currentVariantObj.price : product.sellPrice;
            let img = product.imageUrl ? `<img src="${product.imageUrl}">` : `<span>Img</span>`;

            document.getElementById('productModalContent').innerHTML = `
                <div class="modal-product-layout">
                    <div class="modal-img-box">${img}</div>
                    <div class="modal-info">
                        <h2>${product.name}</h2>
                        <div class="price" id="modalMainPrice" style="color:var(--primary); font-weight:800; font-size:20px;">${basePrice} DH</div>
                        <div class="stock-badge"><div class="stock-dot"></div> Disponible (Stock: ${product.stock})</div>
                    </div>
                </div>

                ${variantsHTML}

                <span class="section-label" style="margin-top:10px;">Quantité</span>
                <div class="qty-row">
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="window.changeModalQty(-1)">-</button>
                        <div class="qty-number" id="modalQtyDisplay">1</div>
                        <button class="qty-btn" onclick="window.changeModalQty(1)">+</button>
                    </div>
                </div>
                
                <div class="price-summary">
                    <span>Prix unitaire</span>
                    <span id="modalUnitPrice" style="color:var(--primary);">${basePrice} DH</span>
                </div>

                <button class="btn-large-primary" onclick="window.confirmAddToCart()">
                    <svg viewBox="0 0 24 24" style="width:20px;height:20px;"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                    Ajouter au panier • <span id="modalBtnTotal">${basePrice} DH</span>
                </button>

                <div class="trust-badges">
                    <div class="trust-item"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg> Produit de qualité</div>
                    <div class="trust-item"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg> Livraison rapide<br>- 30 min</div>
                    <div class="trust-item"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg> Retour facile<br>sous 7 jours</div>
                </div>
            `;

            document.getElementById('productOverlay').classList.add('active');
            document.getElementById('productModal').classList.add('active');
        };

        window.selectVariant = (index) => {
            const boxes = document.querySelectorAll('.variant-box');
            boxes.forEach(b => b.classList.remove('active'));
            boxes[index].classList.add('active');
            
            currentVariantObj = currentModalProduct.variants[index];
            updateModalPrices();
        };

        window.changeModalQty = (change) => {
            const newQty = currentModalQty + change;
            if(newQty >= 1 && newQty <= currentModalProduct.stock) {
                currentModalQty = newQty;
                document.getElementById('modalQtyDisplay').innerText = currentModalQty;
                updateModalPrices();
            }
        };

        function updateModalPrices() {
            const basePrice = currentVariantObj ? currentVariantObj.price : currentModalProduct.sellPrice;
            const total = basePrice * currentModalQty;
            
            document.getElementById('modalMainPrice').innerText = `${basePrice} DH`;
            document.getElementById('modalUnitPrice').innerText = `${basePrice} DH`;
            document.getElementById('modalBtnTotal').innerText = `${total.toFixed(2)} DH`;
        }

        window.closeProductModal = () => { document.getElementById('productOverlay').classList.remove('active'); document.getElementById('productModal').classList.remove('active'); };

        window.confirmAddToCart = () => {
            const priceToUse = currentVariantObj ? currentVariantObj.price : currentModalProduct.sellPrice;
            const variantNameToUse = currentVariantObj ? currentVariantObj.name : null;

            // Check if exact same item+variant is in cart
            const existingIndex = cart.findIndex(c => c.product.id === currentModalProduct.id && c.variantName === variantNameToUse);
            if(existingIndex > -1) {
                const newTotalQty = cart[existingIndex].qty + currentModalQty;
                cart[existingIndex].qty = newTotalQty > currentModalProduct.stock ? currentModalProduct.stock : newTotalQty;
            } else {
                cart.push({ product: currentModalProduct, qty: currentModalQty, unitPrice: priceToUse, variantName: variantNameToUse });
            }
            updateCartUI(); closeProductModal();
        };

        // --- CART LOGIC ---
        window.openCartModal = () => {
            if(cart.length === 0) return;
            document.getElementById('cartItemsContainer').innerHTML = cart.map((item, index) => {
                let img = item.product.imageUrl ? `<img src="${item.product.imageUrl}">` : '';
                let vTag = item.variantName ? `<span class="variant-tag">${item.variantName}</span>` : '';
                return `
                    <div class="cart-item-row">
                        <div class="cart-item-img">${img}</div>
                        <div class="cart-item-details">
                            <h4 style="margin-bottom:0;">${item.product.name}</h4>
                            ${vTag}
                            <div style="color:var(--primary); font-weight:800; font-size:14px; margin-top:4px;">${item.unitPrice} DH</div>
                        </div>
                        <div style="font-weight:800; font-size:14px; background:var(--bg); padding:6px 12px; border-radius:10px; color:var(--text-muted);">x${item.qty}</div>
                        <button class="btn-remove" onclick="window.removeFromCart(${index})"><svg viewBox="0 0 24 24" style="width:18px;height:18px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                    </div>
                `;
            }).join('');

            const total = cart.reduce((sum, item) => sum + (item.unitPrice * item.qty), 0);
            document.getElementById('cartModalTotal').innerText = total.toFixed(2) + ' DH';
            document.getElementById('cartOverlay').classList.add('active'); document.getElementById('cartModal').classList.add('active');
        };

        window.closeCartModal = () => { document.getElementById('cartOverlay').classList.remove('active'); document.getElementById('cartModal').classList.remove('active'); };
        window.removeFromCart = (index) => { cart.splice(index, 1); updateCartUI(); if(cart.length === 0) closeCartModal(); else openCartModal(); };

        function updateCartUI() {
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.unitPrice * item.qty), 0);
            
            document.getElementById('cartCountText').innerText = totalItems + (totalItems > 1 ? " articles" : " article");
            document.getElementById('cartPrice').innerText = `${totalPrice.toFixed(2)} DH`;
            document.querySelectorAll('.top-cart-badge').forEach(b => b.innerText = totalItems);
            
            const bar = document.getElementById('orderBar');
            if(totalItems > 0) bar.classList.remove('hidden'); else bar.classList.add('hidden');
        }

        window.triggerWhatsApp = () => {
            const phone = "212600000000"; // ⚠️ REPLACE WITH REAL NUMBER
            let msg = "📦 *Nouvelle commande Lascoburo*\n\n";
            cart.forEach(item => {
                const vText = item.variantName ? ` (${item.variantName})` : '';
                msg += `• ${item.product.name}${vText} (x${item.qty}) - ${(item.unitPrice * item.qty).toFixed(2)} DH\n`;
            });
            const total = cart.reduce((sum, item) => sum + (item.unitPrice * item.qty), 0);
            msg += `\n💰 *Total à payer : ${total.toFixed(2)} DH*`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
        };
    </script>
</body>
</html>
