<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lascoburo | Boutique</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        
        <header class="app-header">
            <div class="header-left">
                <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
                <div class="brand">
                    <h1>Lasco<span>buro</span></h1>
                    <p>Tout pour apprendre, créer, réussir.</p>
                </div>
            </div>
            <div class="header-right">
                <div class="icon-btn">
                    <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    <span class="badge">1</span>
                </div>
                <div class="icon-btn primary">
                    <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                    <span class="badge top-cart-badge" style="background: white; color: var(--primary); border:none;">0</span>
                </div>
            </div>
        </header>

        <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" placeholder="Rechercher un produit...">
            <svg class="filter-icon" viewBox="0 0 24 24"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
        </div>

        <div class="categories-scroll" id="catBar">
            </div>

        <div class="promo-banner">
            <div class="promo-icon-bg">
                <svg viewBox="0 0 24 24" style="fill:white; stroke:none;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            </div>
            <div class="promo-text">
                <h3>Livraison rapide à Marrakech</h3>
                <p>Commandez aujourd'hui, recevez en moins de 30 min.</p>
            </div>
            <div class="promo-image">🛵</div>
        </div>

        <div class="section-header">
            <h2>Nos produits</h2>
            <a href="#">Voir tout ></a>
        </div>

        <main class="product-grid" id="customerGrid">
            </main>
    </div>

    <div class="sticky-cart hidden" id="orderBar">
        <div class="cart-left">
            <div class="cart-icon-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <div class="badge" id="bottomCartCount">0</div>
            </div>
            <div class="cart-totals">
                <span id="cartCountText">0 articles</span>
                <div class="divider"></div>
                <span id="cartPrice">0 DH</span>
            </div>
        </div>
        <button class="btn-checkout" onclick="openWhatsApp()">
            Voir le panier
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            Accueil
        </a>
        <a href="#" class="nav-item">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            Catégories
        </a>
        <a href="#" class="nav-item">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            Recherche
        </a>
        <a href="#" class="nav-item" onclick="openWhatsApp()">
            <div class="cart-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <div class="badge top-cart-badge" style="top:-8px; right:-8px; width:16px; height:16px; font-size:9px;">0</div>
            </div>
            Panier
        </a>
    </nav>

    <script type="module" src="app-logic.js"></script>
</body>
</html>
