<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lascoburo | Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           VARIABLES & RESET
        ========================================= */
        :root {
            --primary: #1E3A8A;
            --primary-light: #EFF6FF;
            --accent: #2563EB;
            --success: #10B981;
            --danger: #EF4444;
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 12px 24px -8px rgba(30, 58, 138, 0.15);
            --shadow-lg: 0 20px 25px -5px rgba(30, 58, 138, 0.25);
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-pill: 50px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text-main); padding-bottom: 100px; overflow-x: hidden;}
        .container { padding: 0 20px; max-width: 600px; margin: 0 auto; }
        svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* HEADER */
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .brand h1 { font-size: 22px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        .brand span { color: var(--text-main); }
        .brand p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .header-right { display: flex; gap: 12px; }
        .icon-btn { position: relative; background: white; border: 1px solid var(--border); border-radius: 50%; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; color: var(--text-main); cursor: pointer;}
        .icon-btn.primary { background: var(--primary); color: white; border-color: var(--primary); }
        .badge { position: absolute; top: -2px; right: -2px; background: #EF4444; color: white; font-size: 10px; font-weight: 800; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg); }

        /* SEARCH BAR */
        .search-wrapper { position: relative; margin-bottom: 24px; }
        .search-wrapper input { width: 100%; background: white; border: 1px solid var(--border); padding: 16px 20px 16px 50px; border-radius: var(--radius-pill); font-size: 15px; font-family: inherit; color: var(--text-main); box-shadow: var(--shadow-sm); outline: none; transition: 0.2s; }
        .search-wrapper input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 20px; height: 20px; }

        /* CATEGORIES */
        .categories-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; margin: 0 -20px 24px -20px; padding: 0 20px 10px 20px; scroll-behavior: smooth; }
        .categories-scroll::-webkit-scrollbar { display: none; }
        .cat-chip { display: flex; align-items: center; gap: 8px; padding: 12px 20px; background: white; border: 1px solid var(--border); border-radius: var(--radius-pill); font-size: 14px; font-weight: 600; color: var(--text-muted); white-space: nowrap; box-shadow: var(--shadow-sm); cursor: pointer; transition: 0.2s; }
        .cat-chip svg { width: 18px; height: 18px; }
        .cat-chip.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: var(--shadow-md); }

        /* PROMO BANNER */
        .promo-banner { background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%); border-radius: var(--radius-lg); padding: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 30px; position: relative; overflow: hidden; }
        .promo-icon-bg { background: var(--primary); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .promo-text h3 { font-size: 15px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
        .promo-text p { font-size: 12px; color: var(--text-main); line-height: 1.4; max-width: 200px; }
        .promo-image { position: absolute; right: 10px; bottom: 5px; font-size: 60px; }

        /* PRODUCT GRID */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .section-header h2 { font-size: 18px; font-weight: 800; color: var(--text-main); }
        
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .product-card { background: var(--surface); border-radius: var(--radius-xl); padding: 12px; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; cursor: pointer; transition: transform 0.2s;}
        .product-card:active { transform: scale(0.97); }
        .product-img-box { background: var(--bg); border-radius: var(--radius-lg); aspect-ratio: 1; position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; overflow: hidden;}
        .product-img-box img { max-width: 100%; max-height: 100%; object-fit: cover; mix-blend-mode: multiply; }
        .placeholder-text { font-size: 20px; font-weight: 800; color: var(--primary); }

        .product-info h3 { font-size: 14px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
        .product-info p { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .product-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
        .price-stock { display: flex; flex-direction: column; gap: 4px; }
        .price { font-size: 18px; font-weight: 800; color: var(--primary); }
        .stock-indicator { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-main); font-weight: 500; }
        .stock-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; }

        .btn-add { background: var(--primary); color: white; border: none; width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; cursor: pointer; pointer-events: none;}

        /* STICKY CART (Bottom floating bar) */
        .sticky-cart { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--primary); border-radius: var(--radius-lg); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-lg); z-index: 90; max-width: 560px; margin: 0 auto; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer;}
        .sticky-cart.hidden { transform: translateY(200%); }
        .cart-left { display: flex; align-items: center; gap: 15px; color: white; }
        .cart-icon-wrapper { position: relative; }
        .cart-icon-wrapper svg { width: 28px; height: 28px; }
        .cart-icon-wrapper .badge { background: white; color: var(--primary); border: none; top: -5px; right: -8px; }
        .cart-totals { display: flex; align-items: center; gap: 12px; font-weight: 700; }
        .cart-totals span { font-size: 15px; }
        .cart-totals .divider { width: 2px; height: 16px; background: rgba(255,255,255,0.3); }
        .btn-checkout-arrow { color: white; display: flex; align-items: center; }

        /* =========================================
           MODALS & BOTTOM SHEETS
        ========================================= */
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        
        .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 30px 30px 0 0; padding: 30px 20px 40px; z-index: 1001; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); max-height: 90vh; overflow-y: auto; max-width: 600px; margin: 0 auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); }
        .bottom-sheet.active { transform: translateY(0); }
        
        .sheet-handle { width: 40px; height: 5px; background: #E2E8F0; border-radius: 10px; margin: 0 auto 20px; }

        /* Product Modal Specifics */
        .modal-product-layout { display: flex; gap: 20px; margin-bottom: 25px; }
        .modal-img-box { width: 120px; height: 120px; background: var(--bg); border-radius: 20px; display: flex; align-items: center; justify-content: center; padding: 10px; flex-shrink: 0; }
        .modal-img-box img { max-width: 100%; max-height: 100%; object-fit: contain; mix-blend-mode: multiply;}
        .modal-info { display: flex; flex-direction: column; justify-content: center; }
        .modal-info h2 { font-size: 20px; font-weight: 800; margin-bottom: 5px; line-height: 1.2;}
        .modal-info .price { font-size: 22px; margin-bottom: 8px; }
        
        .stock-badge { display: inline-flex; align-items: center; background: var(--success-light, #D1FAE5); color: #065F46; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; width: fit-content; gap: 6px;}

        /* Quantity Selector */
        .qty-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-top: 20px; border-top: 1px solid var(--border); }
        .qty-row span { font-weight: 700; font-size: 16px; }
        .qty-controls { display: flex; align-items: center; background: var(--bg); border-radius: 16px; padding: 4px; }
        .qty-btn { width: 40px; height: 40px; background: white; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: var(--shadow-sm); color: var(--text-main);}
        .qty-number { width: 40px; text-align: center; font-weight: 800; font-size: 18px; }

        .btn-large-primary { width: 100%; background: var(--success); color: white; border: none; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-large-primary:active { transform: scale(0.98); }

        /* Cart Modal Specifics */
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cart-header h2 { font-size: 22px; font-weight: 800; }
        .close-btn { background: var(--bg); border: none; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .cart-items-list { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; max-height: 40vh; overflow-y: auto; padding-right: 5px;}
        .cart-item-row { display: flex; align-items: center; gap: 15px; background: white; border: 1px solid var(--border); padding: 12px; border-radius: 16px; }
        .cart-item-img { width: 60px; height: 60px; background: var(--bg); border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 5px; }
        .cart-item-img img { max-width: 100%; max-height: 100%; mix-blend-mode: multiply; }
        .cart-item-details { flex: 1; }
        .cart-item-details h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
        .cart-item-details .price { font-size: 14px; color: var(--primary); }
        .cart-item-qty { font-weight: 800; font-size: 14px; background: var(--bg); padding: 4px 10px; border-radius: 8px; color: var(--text-muted); }
        .btn-remove { background: #FEE2E2; color: var(--danger); border: none; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .cart-total-row { display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: 800; margin-bottom: 20px; padding-top: 15px; border-top: 2px dashed var(--border); }
    </style>
</head>
<body>

    <div class="container">
        
        <header class="app-header">
            <div class="header-left">
                <div class="brand">
                    <h1>Lasco<span>buro</span></h1>
                    <p>Tout pour apprendre, créer, réussir.</p>
                </div>
            </div>
            <div class="header-right">
                <div class="icon-btn primary" onclick="openCartModal()">
                    <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                    <span class="badge top-cart-badge" style="background: white; color: var(--primary); border:none;" id="headerBadge">0</span>
                </div>
            </div>
        </header>

        <div class="search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" placeholder="Rechercher un produit...">
        </div>

        <div class="categories-scroll" id="catBar">
            <div class="cat-chip active">Chargement...</div>
        </div>

        <div class="promo-banner">
            <div class="promo-icon-bg">
                <svg viewBox="0 0 24 24" style="fill:white; stroke:none;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            </div>
            <div class="promo-text">
                <h3>Livraison rapide à Marrakech</h3>
                <p>Commandez aujourd'hui, recevez en moins de 30 min.</p>
            </div>
            <div class="promo-image">🛵</div>
        </div>

        <div class="section-header">
            <h2>Nos produits</h2>
        </div>

        <main class="product-grid" id="customerGrid">
            </main>
    </div>

    <div class="sticky-cart hidden" id="orderBar" onclick="openCartModal()">
        <div class="cart-left">
            <div class="cart-icon-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <div class="badge" id="bottomCartCount">0</div>
            </div>
            <div class="cart-totals">
                <span id="cartCountText">0 articles</span>
                <div class="divider"></div>
                <span id="cartPrice">0 DH</span>
            </div>
        </div>
        <div class="btn-checkout-arrow">
            Voir le panier
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </div>
    </div>


    <div class="overlay" id="productOverlay" onclick="closeProductModal()"></div>
    <div class="bottom-sheet" id="productModal">
        <div class="sheet-handle"></div>
        <div id="productModalContent">
            </div>
    </div>

    <div class="overlay" id="cartOverlay" onclick="closeCartModal()"></div>
    <div class="bottom-sheet" id="cartModal">
        <div class="sheet-handle"></div>
        <div class="cart-header">
            <h2>Votre Panier</h2>
            <button class="close-btn" onclick="closeCartModal()">
                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        
        <div class="cart-items-list" id="cartItemsContainer">
            </div>

        <div class="cart-total-row">
            <span>Total :</span>
            <span style="color: var(--primary);" id="cartModalTotal">0 DH</span>
        </div>

        <button class="btn-large-primary" onclick="triggerWhatsApp()">
            <svg viewBox="0 0 24 24" style="fill:white; stroke:none;"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
            Commander via WhatsApp
        </button>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ⚠️ YOUR ACTUAL KEYS 
        const firebaseConfig = {
            apiKey: "AIzaSyCKY59mqLqD4GqQpkDEFqNybKIkwLvgId0",
            authDomain: "lascoburo.firebaseapp.com",
            projectId: "lascoburo",
            storageBucket: "lascoburo.firebasestorage.app",
            messagingSenderId: "918363477454",
            appId: "1:918363477454:web:ef0a991d24de1ea992879f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State
        let allProducts = [];
        let allCategories = [];
        let currentCategory = 'Tous';
        let searchQuery = '';
        
        // Cart state is now an array of objects: { productData, qty }
        let cart = []; 
        let currentModalProduct = null;
        let currentModalQty = 1;

        // Icons
        const categoryIcons = {
            'Cahiers': '<svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>',
            'Stylos': '<svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>',
            'Sacs': '<svg viewBox="0 0 24 24"><path d="M4 10h16v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V10z"></path><path d="M8 10V6a4 4 0 0 1 8 0v4"></path></svg>',
            'Papeterie': '<svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><line x1="20" y1="4" x2="8.12" y2="15.88"></line><line x1="14.47" y1="14.48" x2="20" y2="20"></line><line x1="8.12" y1="8.12" x2="12" y2="12"></line></svg>',
            'Pencil': '<svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>',
            'default': '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>'
        };

        // --- 1. FIREBASE DATA LOAD ---
        onSnapshot(collection(db, "products"), (snap) => {
            allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const rawCategories = [...new Set(allProducts.map(p => p.category))];
            allCategories = rawCategories.filter(cat => cat && cat.trim() !== '').sort();
            
            renderCategories();
            filterAndRenderProducts();
        });

        // --- 2. CATEGORY TABS ---
        function renderCategories() {
            const catBar = document.getElementById('catBar');
            const tousIcon = '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>';
            
            let html = `<div id="cat-Tous" class="cat-chip ${currentCategory === 'Tous' ? 'active' : ''}" onclick="window.setCategory('Tous', 'cat-Tous')">
                            ${tousIcon} Tous
                        </div>`;
            
            allCategories.forEach((cat, index) => {
                const icon = categoryIcons[cat] || categoryIcons['default'];
                const elId = `cat-${index}`;
                html += `<div id="${elId}" class="cat-chip ${currentCategory === cat ? 'active' : ''}" onclick="window.setCategory('${cat}', '${elId}')">
                            ${icon} ${cat}
                         </div>`;
            });
            
            catBar.innerHTML = html;
        }

        window.setCategory = (catName, elementId) => {
            currentCategory = catName;
            renderCategories(); 
            filterAndRenderProducts();
            setTimeout(() => {
                const el = document.getElementById(elementId);
                if(el) { el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }); }
            }, 50);
        };

        // --- 3. SEARCH & GRID ---
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            filterAndRenderProducts();
        });

        function filterAndRenderProducts() {
            let filtered = allProducts;
            if (currentCategory !== 'Tous') { filtered = filtered.filter(p => p.category === currentCategory); }
            if (searchQuery !== '') { filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery)); }
            
            const grid = document.getElementById('customerGrid');
            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column: span 2; text-align: center; padding: 40px; color: var(--text-muted);">Aucun produit trouvé.</div>`;
                return;
            }

            grid.innerHTML = filtered.map(p => {
                let imageContent = p.imageUrl && p.imageUrl.trim() !== '' 
                    ? `<img src="${p.imageUrl}" alt="${p.name}">` 
                    : `<span class="placeholder-text">${p.name.split(' ')[0]}</span>`;

                let stockHTML = p.stock > 0 
                    ? `<div class="stock-indicator"><div class="stock-dot"></div> En stock</div>`
                    : `<div class="stock-indicator" style="color: var(--danger);"><div class="stock-dot" style="background: var(--danger);"></div> Rupture</div>`;

                return `
                    <div class="product-card" onclick="window.openProductModal('${p.id}')">
                        <div class="product-img-box">
                            ${imageContent}
                        </div>
                        <div class="product-info">
                            <h3>${p.name}</h3>
                            <p>${p.category}</p>
                        </div>
                        <div class="product-footer">
                            <div class="price-stock">
                                <span class="price">${p.sellPrice} DH</span>
                                ${stockHTML}
                            </div>
                            <button class="btn-add" style="${p.stock <= 0 ? 'background:var(--border); color:var(--text-muted);' : ''}">+</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- 4. PRODUCT MODAL LOGIC ---
        window.openProductModal = (id) => {
            const product = allProducts.find(p => p.id === id);
            if (!product || product.stock <= 0) return; // Don't open if out of stock
            
            currentModalProduct = product;
            currentModalQty = 1; // reset default
            
            let imageContent = product.imageUrl ? `<img src="${product.imageUrl}">` : `<span class="placeholder-text">Img</span>`;
            
            document.getElementById('productModalContent').innerHTML = `
                <div class="modal-product-layout">
                    <div class="modal-img-box">${imageContent}</div>
                    <div class="modal-info">
                        <h2>${product.name}</h2>
                        <div class="price" style="color: var(--primary); font-weight:800;">${product.sellPrice} DH</div>
                        <div class="stock-badge">
                            <div class="stock-dot"></div> Disponible (Stock: ${product.stock})
                        </div>
                    </div>
                </div>

                <div class="qty-row">
                    <span>Quantité</span>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="window.changeModalQty(-1)">-</button>
                        <div class="qty-number" id="modalQtyDisplay">1</div>
                        <button class="qty-btn" onclick="window.changeModalQty(1)">+</button>
                    </div>
                </div>

                <button class="btn-large-primary" onclick="window.confirmAddToCart()">
                    Ajouter au panier • <span id="modalBtnTotal">${product.sellPrice} DH</span>
                </button>
            `;

            document.getElementById('productOverlay').classList.add('active');
            document.getElementById('productModal').classList.add('active');
        };

        window.closeProductModal = () => {
            document.getElementById('productOverlay').classList.remove('active');
            document.getElementById('productModal').classList.remove('active');
        };

        window.changeModalQty = (change) => {
            if(!currentModalProduct) return;
            const newQty = currentModalQty + change;
            
            // Limit between 1 and max stock available
            if(newQty >= 1 && newQty <= currentModalProduct.stock) {
                currentModalQty = newQty;
                document.getElementById('modalQtyDisplay').innerText = currentModalQty;
                document.getElementById('modalBtnTotal').innerText = (currentModalProduct.sellPrice * currentModalQty).toFixed(2) + ' DH';
            }
        };

        window.confirmAddToCart = () => {
            // Check if product already in cart
            const existingIndex = cart.findIndex(c => c.product.id === currentModalProduct.id);
            if(existingIndex > -1) {
                // Add to existing quantity without exceeding stock
                const newTotalQty = cart[existingIndex].qty + currentModalQty;
                cart[existingIndex].qty = newTotalQty > currentModalProduct.stock ? currentModalProduct.stock : newTotalQty;
            } else {
                // Add new item
                cart.push({ product: currentModalProduct, qty: currentModalQty });
            }
            
            updateCartUI();
            closeProductModal();
        };


        // --- 5. CART MODAL LOGIC ---
        window.openCartModal = () => {
            if(cart.length === 0) return;

            const container = document.getElementById('cartItemsContainer');
            
            container.innerHTML = cart.map((item, index) => {
                let img = item.product.imageUrl ? `<img src="${item.product.imageUrl}">` : '';
                return `
                    <div class="cart-item-row">
                        <div class="cart-item-img">${img}</div>
                        <div class="cart-item-details">
                            <h4>${item.product.name}</h4>
                            <div class="price">${item.product.sellPrice} DH</div>
                        </div>
                        <div class="cart-item-qty">x${item.qty}</div>
                        <button class="btn-remove" onclick="window.removeFromCart(${index})">
                            <svg viewBox="0 0 24 24" style="width:16px;height:16px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                `;
            }).join('');

            const total = cart.reduce((sum, item) => sum + (parseFloat(item.product.sellPrice) * item.qty), 0);
            document.getElementById('cartModalTotal').innerText = total.toFixed(2) + ' DH';

            document.getElementById('cartOverlay').classList.add('active');
            document.getElementById('cartModal').classList.add('active');
        };

        window.closeCartModal = () => {
            document.getElementById('cartOverlay').classList.remove('active');
            document.getElementById('cartModal').classList.remove('active');
        };

        window.removeFromCart = (index) => {
            cart.splice(index, 1);
            updateCartUI();
            
            if(cart.length === 0) {
                closeCartModal();
            } else {
                openCartModal(); // Refresh cart UI
            }
        };

        function updateCartUI() {
            const bar = document.getElementById('orderBar');
            
            // Calculate total quantity and price based on {product, qty} structure
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (parseFloat(item.product.sellPrice) * item.qty), 0);
            
            document.getElementById('bottomCartCount').innerText = totalItems;
            document.getElementById('cartCountText').innerText = totalItems + (totalItems > 1 ? " articles" : " article");
            document.getElementById('cartPrice').innerText = `${totalPrice.toFixed(2)} DH`;
            document.getElementById('headerBadge').innerText = totalItems;
            
            if(totalItems > 0) {
                bar.classList.remove('hidden');
            } else {
                bar.classList.add('hidden');
            }
        }

        // --- 6. WHATSAPP CHECKOUT ---
        window.triggerWhatsApp = () => {
            if(cart.length === 0) return;

            const phone = "212600000000"; // ⚠️ REPLACE WITH REAL NUMBER
            let message = "📦 *Nouvelle commande Lascoburo*\n\n";
            
            cart.forEach(item => {
                message += `• ${item.product.name} (x${item.qty}) - ${(item.product.sellPrice * item.qty).toFixed(2)} DH\n`;
            });

            const total = cart.reduce((sum, item) => sum + (parseFloat(item.product.sellPrice) * item.qty), 0);
            message += `\n💰 *Total à payer : ${total.toFixed(2)} DH*`;
            
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
        };
    </script>
</body>
</html>
